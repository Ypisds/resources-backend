name: Continuous Integration and CD

on:
  pull_request:
    branches: 
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx flake8 black

      - name: Check Formatting (Black)
        run: black --check --line-length 88 .

      - name: Run Linter (Flake8)
        run: |
          flake8 . --count --max-line-length=88 --extend-ignore=E203 --exclude=.venv,venv,__pycache__ --statistics
          
      - name: Testing
        run: |
          python -m pytest

  deploy:
    name: Deploy to Render
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -f ${{ secrets.RENDER_DEPLOY_HOOK }}
    
